<section class="document-studio" aria-label="Workspace detail">
  @if (workspaceResource.isLoading()) {
    <div class="document-studio__status">
      <mat-spinner diameter="36"></mat-spinner>
    </div>
  } @else if (workspaceErrorMessage()) {
    <p class="document-studio__error">{{ workspaceErrorMessage() }}</p>
  } @else if (workspace(); as workspace) {
    <app-workspace-header [workspace]="workspace"></app-workspace-header>

    <div class="document-studio__workspace-grid">
      <div class="document-studio__documents">
        <app-document-upload
          [workspaceId]="workspace.id"
          [onUploaded]="handleDocumentUploaded"
        ></app-document-upload>

        <app-document-list
          [workspaceId]="workspace.id"
          [documents]="documents()"
          [isLoading]="documentsResource.isLoading()"
          [errorMessage]="documentsErrorMessage()"
        ></app-document-list>
      </div>

      <app-operational-rules-panel
        [rules]="rules()"
        [isLoading]="rulesResource.isLoading()"
        [isSaving]="isSavingRule()"
        [errorMessage]="rulesErrorMessage()"
        [saveErrorMessage]="ruleSaveError()"
        [deletingRuleId]="deletingRuleId()"
        (createRule)="createRule($event)"
        (deleteRule)="deleteRule($event)"
      ></app-operational-rules-panel>
    </div>
  }
</section>
