services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmindai-postgres
    environment:
      POSTGRES_DB: taskmindai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - taskmindai-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: taskmindai-redis
    ports:
      - '6379:6379'

volumes:
  taskmindai-postgres-data:
