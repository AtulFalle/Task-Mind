services:
  postgres:
    image: postgres:16-alpine
    container_name: taskmindai-postgres
    environment:
      POSTGRES_DB: taskmindai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - taskmindai-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: taskmindai-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  ai:
    build:
      context: .
      dockerfile: docker/ai.Dockerfile
    container_name: taskmindai-ai
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-4500}
    ports:
      - '8001:8001'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=5)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  taskmindai-postgres-data:
